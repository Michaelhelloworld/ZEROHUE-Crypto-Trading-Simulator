<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="shortcut icon" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>ZEROHUE | Crypto Trading Simulator</title>
    <meta
      name="description"
      content="ZEROHUE is a local-first crypto trading simulator with live market context, paper execution, and no account required."
    />
    <meta
      name="keywords"
      content="crypto trading simulator, paper trading, binance, coinbase, local-first trading"
    />
    <meta name="robots" content="index,follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ZEROHUE" />
    <meta property="og:url" content="https://zerohue.org/" />
    <link rel="canonical" href="https://zerohue.org/" />
    <meta property="og:title" content="ZEROHUE | Crypto Trading Simulator" />
    <meta
      property="og:description"
      content="ZEROHUE is a local-first crypto trading simulator with live market context, paper execution, and no account required."
    />
    <meta property="og:image" content="https://zerohue.org/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ZEROHUE | Crypto Trading Simulator" />
    <meta
      name="twitter:description"
      content="ZEROHUE is a local-first crypto trading simulator with live market context, paper execution, and no account required."
    />
    <meta name="twitter:image" content="https://zerohue.org/logo.png" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #020617;
        /* Slate 950 */
        color: #f1f5f9;
        /* Slate 100 */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 3px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #475569;
      }

      /* Glass Utilities */
      .glass {
        background: rgba(30, 41, 59, 0.4);
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .glass-card {
        background: linear-gradient(145deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.6) 100%);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.03);
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
